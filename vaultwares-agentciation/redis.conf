# Redis configuration for VaultWares Agentciation
# Used by RedisCoordinator, ExtrovertAgent, and LonelyManager
# Start Redis with: redis-server vaultwares-agentciation/redis.conf

# ---------------------------------------------------------------
# Network
# ---------------------------------------------------------------
bind 127.0.0.1
port 6379
protected-mode yes

# ---------------------------------------------------------------
# General
# ---------------------------------------------------------------
daemonize no
loglevel notice
logfile ""

# Database index 0 is used by all agents by default.
# The agent classes accept redis_db as a constructor argument
# if you need to separate environments.
databases 1

# ---------------------------------------------------------------
# Persistence (disabled for pure pub/sub coordination)
# ---------------------------------------------------------------
save ""
appendonly no

# ---------------------------------------------------------------
# Memory
# ---------------------------------------------------------------
# Limit Redis to 64 MB for local agent coordination.
# Increase if storing large payloads in hashes.
maxmemory 64mb
maxmemory-policy allkeys-lru

# ---------------------------------------------------------------
# Pub/Sub
# ---------------------------------------------------------------
# Channels used by VaultWares agents:
#   tasks   — main coordination channel (heartbeats, status, messages)
#   alerts  — critical alerts published by LonelyManager

# ---------------------------------------------------------------
# Connection instructions for agents
# ---------------------------------------------------------------
# Host     : localhost (127.0.0.1)
# Port     : 6379
# Password : (none — local dev only; set requirepass below for production)
# DB       : 0
# Channels : tasks, alerts
#
# To enable password authentication (recommended for non-local deploys):
#   requirepass your_strong_password_here
#
# Then update RedisCoordinator / agent constructors:
#   redis.Redis(host='localhost', port=6379, db=0, password='your_password')
